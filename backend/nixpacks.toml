# Nixpacks config for Railway deployment
# Force ONLY PHP provider — prevent Node/npm detection from package.json
providers = ["php"]

# Let nixpacks PHP provider handle setup (PHP + composer auto-detected)
# Only override install, build, and start

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force 2>/dev/null | true && php -S 0.0.0.0:$PORT -t public"
