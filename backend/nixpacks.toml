# Nixpacks config for Railway deployment
# Tells Railway how to build and run the Laravel app

[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_pgsql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.curl", "php82Extensions.zip", "composer"]

# Explicitly override Node install phase with empty command to skip npm ci
[phases.nodeInstall]
cmds = []

# Only install PHP deps
[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --force 2>/dev/null | true && php -S 0.0.0.0:$PORT -t public"
